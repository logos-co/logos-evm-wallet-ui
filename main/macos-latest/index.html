rendered: wait for ['Load tokens']\n- Switch to the History tab: call 'walletRoot'.selectTab(4)\n- History tab rendered: wait for ['Recent activity']\n- Switch to the Private tab: call 'walletRoot'.selectTab(5)\n- Private (RAILGUN) tab rendered: wait for ['Shielded balance']\n- Switch to the Settings tab: call 'walletRoot'.selectTab(6)\n- Settings tab rendered: wait for ['Apply proxy']\n- Enter a SOCKS5 (Tor) proxy URL: set placeholderText='socks5h://127.0.0.1:9050' to 'socks5h://127.0.0.1:9050'\n- Apply the proxy (UI -> backend round-trip): click 'Apply proxy'\n- Status flips to 'Proxy applied': wait for ['Proxy applied']\n- Switch to the Advanced tab: call 'walletRoot'.selectTab(7)\n- Advanced tab rendered: wait for ['Custom network']", "status": "pass", "output": "\nRunning 1 test(s)...\n\n  \u001b[32m\u2713\u001b[0m Driving the Wallet UI App Headlessly: Launch and drive the app\n\n1 passed, 0 failed\n\n", "note": ""}]}]}, {"meta": {"name": "Wallet UI end-to-end: configure a network, import, unlock, send", "platform": "Darwin (ext=dylib)", "release": "(none)"}, "rows": [{"md": "# Wallet UI end-to-end: configure a network, import, unlock, send\n\nThis doc-test drives the `logos-evm-wallet-ui` standalone app **headless**\nthrough a full wallet flow \u2014 the same end-to-end validation the\n[`wallet-backend` runtime doc-test](https://github.com/logos-co/logos-evm-wallet-backend-module)\nperforms against the coordinator, but here **every step goes through the real\nQML UI** over the Logos bridge.\n\nIt launches the app with `QT_QPA_PLATFORM=offscreen`, drives it with\n[`logos-qt-mcp`](https://github.com/logos-co/logos-qt-mcp), and on the new\n**Advanced** tab points the wallet at a **local mock JSON-RPC node**, then\nimports Foundry's well-known test account, unlocks it, sends a native transfer,\nand confirms it lands in History \u2014 proving the UI \u2192 C++ backend \u2192\n`wallet_backend_module` \u2192 eth-rpc / keystore round-trips end to end.\n\n**What you'll build:** The wallet UI standalone app, launched headless and driven through its Advanced, Send, and History tabs against a local mock JSON-RPC node.\n\n**What you'll learn:**\n\n- How the Advanced tab repoints the wallet at a custom RPC endpoint (setChains / testEndpoint)\n- How to import and unlock an account and send a native transfer entirely through the UI\n- How a UI-initiated send composes build \u2192 sign \u2192 broadcast \u2192 record across the backend module tree\n\n## Prerequisites\n\n- **Nix** with flakes enabled (see [nixos.org](https://nixos.org/download.html)).\n\n- **A Linux or macOS machine** with `python3` available (for the local mock JSON-RPC node). The app runs headless via `QT_QPA_PLATFORM=offscreen`, so no display is required.", "execs": []}, {"md": "## Step 1: Build the qt-mcp test driver\n\n[`logos-qt-mcp`](https://github.com/logos-co/logos-qt-mcp) connects to the\napp's QML inspector and drives it. Build it once and link it as\n`./result-mcp`.", "execs": []}, {"md": "### 1.1 Build logos-qt-mcp\n\n```bash\nnix build 'github:logos-co/logos-qt-mcp' -o result-mcp\n```", "execs": [{"kind": "run", "cmd": "nix build 'github:logos-co/logos-qt-mcp' -o result-mcp", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "## Step 2: Start a local mock JSON-RPC node\n\nThe wallet is pointed at this node (chain id 1337) from the UI's Advanced\ntab. It answers the methods the send pipeline needs with canned values, so\nthe run is offline and deterministic.", "execs": []}, {"md": "### 2.1 Write the mock node\n\n```\nimport http.server, json\nRES = {\n    \"eth_chainId\": \"0x539\",                 # 1337\n    \"eth_getTransactionCount\": \"0x0\",\n    \"eth_gasPrice\": \"0x3b9aca00\",\n    \"eth_estimateGas\": \"0x5208\",\n    \"eth_sendRawTransaction\": \"0x\" + \"ab\" * 32,\n}\nclass H(http.server.BaseHTTPRequestHandler):\n    def do_POST(self):\n        n = int(self.headers.get('content-length', 0))\n        req = json.loads(self.rfile.read(n) or b'{}')\n        body = json.dumps({\"jsonrpc\": \"2.0\", \"id\": req.get(\"id\", 1),\n                           \"result\": RES.get(req.get(\"method\"), \"0x0\")}).encode()\n        self.send_response(200)\n        self.send_header('content-length', str(len(body)))\n        self.end_headers()\n        self.wfile.write(body)\n    def log_message(self, *a): pass\nhttp.server.HTTPServer(('127.0.0.1', 8613), H).serve_forever()\n```", "execs": [{"kind": "file", "cmd": "write mock_node.py", "status": "pass", "note": "Wrote mock_node.py"}]}, {"md": "### 2.2 Start the mock node\n\n```bash\npython3 mock_node.py &\n```", "execs": [{"kind": "run", "cmd": "sh -c 'python3 mock_node.py > mock.log 2>&1 & echo $! > mock.pid'", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "```bash\nsleep 2\n```", "execs": [{"kind": "run", "cmd": "sleep 2", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "## Step 3: Launch the wallet UI and drive the full flow\n\nLaunch the standalone app with `nix run`. It bundles\n`wallet_backend_module` and its dependency modules and auto-loads them, so a\nUI that can drive a send is itself proof the whole module tree is wired.\n\n> The first launch builds the full app bundle (the UI plugin, the backend and\n> its dependencies, and the standalone-app shell), so we allow a generous\n> timeout.", "execs": []}, {"md": "### 3.1 Drive the app: Advanced \u2192 Send \u2192 History\n\n```bash\nnix run github:logos-co/logos-evm-wallet-ui/8f4abda174c2b2de34bcc7da6f66a637d1d811ec --no-write-lock-file -- --height 1000\n```\n\n![App window opens on the Balances tab](data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAABAAAAAPoCAIAAADPzxu1AAAACXBIWXMAAA7EAAAOxAGVKw4bAAAgAElEQVR4nOzdd1QU198G8O8Wdim7dATpioViAbH3XiL2GDXmZ4um2HtPYu8llmhiSawxiT12jIIdURAEpSq9idQFtrDl/WN03w0ggkFA5/mcnJOZO3dm753B2XmmLUej0RAAAAAAALADt6YbAAAAAAAA1QcBAAAAAACARRAAAAAAAABYBAEAAAAAAIBFEAAAAAAAAFgEAQAAAAAAgEUQAAAAAAAAWAQBAAAAAACARRAAAAAAAABYBAEAAAAAAIBFEAAAA <script>
  const DATA = JSON.parse(document.getElementById("report-data").textContent);
  if (window.marked) { marked.setOptions({ gfm: true, breaks: false }); }
  const mdToHtml = (s) => window.marked ? marked.parse(s || "") : ("<pre>" + (s || "") + "</pre>");

  const sum = DATA.summary;
  document.getElementById("summary").innerHTML =
    `<span class="pill pass">${sum.passed} passed</span> ` +
    (sum.failed ? `<span class="pill fail">${sum.failed} failed</span> ` : "") +
    (sum.skipped ? `<span class="pill skip">${sum.skipped} skipped</span>` : "");

  const picker = document.getElementById("picker");
  DATA.tutorials.forEach((t, i) => {
    const o = document.createElement("option");
    o.value = i; o.textContent = t.meta.name; picker.appendChild(o);
  });

  function execHtml(e) {
    const badge = `<span class="badge ${e.status}">${e.status.toUpperCase()}</span>`;
    const kind = `<span class="kind">${e.kind}${e.exit_code !== undefined ? " · exit " + e.exit_code : ""}</span>`;
    let h = `<div class="exec"><div class="exec-head">${badge}${kind}</div>`;
    if (e.note) h += `<div class="note">${escapeHtml(e.note)}</div>`;
    if (e.cmd) h += `<pre class="cmd">${escapeHtml(e.cmd)}</pre>`;
    const out = (e.output || "").trim();
    if (out) {
      const long = out.split("\n").length > 12;
      if (long) {
        h += `<details><summary>output (${out.split("\n").length} lines)</summary><pre class="output">${escapeHtml(out)}</pre></details>`;
      } else {
        h += `<pre class="output">${escapeHtml(out)}</pre>`;
      }
    }
    h += `</div>`;
    return h;
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
  }

  function render(idx) {
    const t = DATA.tutorials[idx];
    const main = document.getElementById("main");
    main.innerHTML = "";
    const h = document.createElement("div");
    h.className = "tutorial-title";
    h.textContent = t.meta.name + "  —  " + t.meta.platform;
    main.appendChild(h);

    t.rows.forEach(row => {
      const isStructural = row.execs.length === 0 &&
        (/^#\s|^##\s/.test(row.md.trim()));
      const div = document.createElement("div");
      const hasExec = row.execs.length > 0;
      const hasFail = row.execs.some(e => e.status === "fail");
      div.className = "row" + (hasExec ? "" : (isStructural ? " section" : " preamble")) +
        (hasFail ? " has-fail" : "");

      const left = document.createElement("div");
      left.className = "col left";
      left.innerHTML = `<div class="md">${mdToHtml(row.md)}</div>`;
      div.appendChild(left);

      if (hasExec || !isStructural) {
        const right = document.createElement("div");
        right.className = "col right";
        if (hasExec) {
          right.innerHTML = `<div class="col-label">Executed</div>` +
            row.execs.map(execHtml).join("");
        } else {
          right.innerHTML = `<div class="col-label">Executed</div>` +
            `<div class="empty">No commands run for this step.</div>`;
        }
        div.appendChild(right);
      }
      main.appendChild(div);
    });
  }

  function slug(s) {
    return String(s).toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "");
  }
  function indexFromHash() {
    const raw = decodeURIComponent(location.hash.replace(/^#/, ""));
    if (!raw) return 0;
    if (/^\d+$/.test(raw) && +raw < DATA.tutorials.length) return +raw;
    const i = DATA.tutorials.findIndex(
      t => slug(t.meta.name) === raw || t.meta.name === raw
    );
    return i >= 0 ? i : 0;
  }
  function show(idx) { picker.value = idx; render(idx); }
  picker.addEventListener("change", () => {
    location.hash = slug(DATA.tutorials[+picker.value].meta.name);
    render(+picker.value);
  });
  window.addEventListener("hashchange", () => show(indexFromHash()));
  show(indexFromHash());
</script>
