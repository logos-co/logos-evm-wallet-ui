coordinator, but here **every step goes through the real\nQML UI** over the Logos bridge.\n\nIt launches the app with `QT_QPA_PLATFORM=offscreen`, drives it with\n[`logos-qt-mcp`](https://github.com/logos-co/logos-qt-mcp), and on the new\n**Advanced** tab points the wallet at a **local mock JSON-RPC node**, then\nimports Foundry's well-known test account, unlocks it, sends a native transfer,\nand confirms it lands in History \u2014 proving the UI \u2192 C++ backend \u2192\n`wallet_backend_module` \u2192 eth-rpc / keystore round-trips end to end.\n\n**What you'll build:** The wallet UI standalone app, launched headless and driven through its Advanced, Send, and History tabs against a local mock JSON-RPC node.\n\n**What you'll learn:**\n\n- How the Advanced tab repoints the wallet at a custom RPC endpoint (setChains / testEndpoint)\n- How to import and unlock an account and send a native transfer entirely through the UI\n- How a UI-initiated send composes build \u2192 sign \u2192 broadcast \u2192 record across the backend module tree\n\n## Prerequisites\n\n- **Nix** with flakes enabled (see [nixos.org](https://nixos.org/download.html)).\n\n- **A Linux or macOS machine** with `python3` available (for the local mock JSON-RPC node). The app runs headless via `QT_QPA_PLATFORM=offscreen`, so no display is required.", "execs": []}, {"md": "## Step 1: Build the qt-mcp test driver\n\n[`logos-qt-mcp`](https://github.com/logos-co/logos-qt-mcp) connects to the\napp's QML inspector and drives it. Build it once and link it as\n`./result-mcp`.", "execs": []}, {"md": "### 1.1 Build logos-qt-mcp\n\n```bash\nnix build 'github:logos-co/logos-qt-mcp' -o result-mcp\n```", "execs": [{"kind": "run", "cmd": "nix build 'github:logos-co/logos-qt-mcp' -o result-mcp", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "## Step 2: Start a local mock JSON-RPC node\n\nThe wallet is pointed at this node (chain id 1337) from the UI's Advanced\ntab. It answers the methods the send pipeline needs with canned values, so\nthe run is offline and deterministic.", "execs": []}, {"md": "### 2.1 Write the mock node\n\n```\nimport http.server, json\nRES = {\n    \"eth_chainId\": \"0x539\",                 # 1337\n    \"eth_getTransactionCount\": \"0x0\",\n    \"eth_gasPrice\": \"0x3b9aca00\",\n    \"eth_estimateGas\": \"0x5208\",\n    \"eth_sendRawTransaction\": \"0x\" + \"ab\" * 32,\n}\nclass H(http.server.BaseHTTPRequestHandler):\n    def do_POST(self):\n        n = int(self.headers.get('content-length', 0))\n        req = json.loads(self.rfile.read(n) or b'{}')\n        body = json.dumps({\"jsonrpc\": \"2.0\", \"id\": req.get(\"id\", 1),\n                           \"result\": RES.get(req.get(\"method\"), \"0x0\")}).encode()\n        self.send_response(200)\n        self.send_header('content-length', str(len(body)))\n        self.end_headers()\n        self.wfile.write(body)\n    def log_message(self, *a): pass\nhttp.server.HTTPServer(('127.0.0.1', 8613), H).serve_forever()\n```", "execs": [{"kind": "file", "cmd": "write mock_node.py", "status": "pass", "note": "Wrote mock_node.py"}]}, {"md": "### 2.2 Start the mock node\n\n```bash\npython3 mock_node.py &\n```", "execs": [{"kind": "run", "cmd": "sh -c 'python3 mock_node.py > mock.log 2>&1 & echo $! > mock.pid'", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "```bash\nsleep 2\n```", "execs": [{"kind": "run", "cmd": "sleep 2", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "## Step 3: Launch the wallet UI and drive the full flow\n\nLaunch the standalone app with `nix run`. It bundles\n`wallet_backend_module` and its dependency modules and auto-loads them, so a\nUI that can drive a send is itself proof the whole module tree is wired.\n\n> The first launch builds the full app bundle (the UI plugin, the backend and\n> its dependencies, and the standalone-app shell), so we allow a generous\n> timeout.", "execs": []}, {"md": "### 3.1 Drive the app: Advanced \u2192 Send \u2192 History\n\n```bash\nnix run github:logos-co/logos-evm-wallet-ui/68f7c4fe6005990dea38de67d6853d12d9045872 --no-write-lock-file -- --height 2000\n```\n\n![App window opens on the Balances tab](data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAABAAAAAfQCAIAAADTqbpmAAAACXBIWXMAAA7EAAAOxAGVKw4bAAAgAElEQVR4nOzdd3xUVd4/8O+dXjOTXkibVEICCUlI6ASQJs2CrBQFWX/P2lZ3dV11Xeu6VVd9WFexsw07oAjSDAkqAUIkIYGQRnojbSYzk+kzvz+u3p1nUkggEGA+7z/ymntuO3PvyZ3zvfecc5ng4GACAAAAAADvwBvrDAAAAAAAwJWDAAAAAAAAwIsgAAAAAAAA8CIIAAAAAAAAvAgCAAAAAAAAL4IAAAAAAADAiyAAAAAAAADwIggAAAAAAAC8CAIAAAAAAAAvggAAAAAAAMCLIAAAAAAAAPAiCAAAAAAAALwIAgAAAAAAAC+CAAAAAAAAwIsgAAAAAAAA8CIIAAAAAAAAvIhg+IuKRCIe778Bg9lsvgz5uTYwDCMWi7lJh8Nhs9n6L8YdMafTabVa+y8gEAgEgh9OgcvlslgsI81JSkrKPffcw02+8sorNTU1F5wFAAAAAF5rBAHABx98MGPGDG5y3LhxDofjMmTpGiCXy8+ePcvV3b/66qu77rqr/2LHjh0LDQ0loq6urpSUFJfL5bHAiy++uGbNGvazw+FITEw0GAwjykloaOiqVau4yf3793O1/CFmAQAAAIDXGkEAAByDwVBYWDht2jR2ctasWUKh0OMhQFJSElv7JyJ/f//U1NTi4mKP7cydO5f7fObMmZHW/sfE4sWLp0yZQkRdXV2vv/76WGcHAAAAAEYGfQAu0oEDB7jPCoUiMzPTYwH3yj0RzZ8/32OBCRMmhISEDLjBq9k999xz//3333///Y8++uhY5wUAAAAARgwBwEXyqK/PmzfPYwGPlP4LeEQIBw8eHL3cXS5CoXDy5MljnQsAAAAAuHgIAC5SVVVVQ0MDN+lRv5fL5dnZ2e4pkydPVqvV7inuq3R2dvZvIHQVSktLc+/9DAAAAADXnCsaAMhkMo1G4+fnN6K1JBJJQEBA/3pnaGjoI488MuANaYZhgoODIyMjhULhMPcilUo1Go2vr+/wM+Z+zz45OTk4OJibnDFjhseueTxeTk4ONymXy7OysrjJ3Nxcp9PZfxcSiSQ6OjosLEwqlQ4/YxdBJBJFRUUFBQUxDDPEYh5RDQAAAABcc65EJ+CoqKhNmzbdfPPNQUFBbIrJZMrPz3/vvfcOHz484CoxMTEbN26Mj4+Pi4sbN24cj8dzOp21tbXbt2/funVramrqnXfeuWDBAj6f39TUdPLkSXYtPp+/YsWKjRs3pqens/Vvl8tVX1//4Ycf/vOf/+zu7u6/o7S0NDaKCAgIYFOMRmNZWdmWLVv27t3bf9wedwcOHNi0aRM3mZOT89FHH7Gf+zf4YRN37tzJfp45c6Z7hLB//373JWfNmrVx48bp06e7ByQdHR15eXmbN2+uqqoaIlcj4u/vv3Hjxttvvz08PJyt+ttsthMnTrz33nu7du3iFsvOzn711VeJiDtKRCSRSAoLC9nPf/rTnz777LPRyhUAAAAAXD6XPQBYvnz55s2bPW5gS6XSxYsXL168+P3333/qqafsdrv7rF//+td33313/zvosbGxjz76qEffU66OrlKp3nzzTfe77ETEMEx0dPTjjz++YcOGjRs3lpSUuM994YUX7r77bo8Ms613srOzDx48uGHDhiGGOv3uu+/6+vpkMhk7OW/ePC4A8GjfzyUyDMNm2H0Bm82Wn5/Pff233nprwYIF/VcPDAy87 <script>
  const DATA = JSON.parse(document.getElementById("report-data").textContent);
  if (window.marked) { marked.setOptions({ gfm: true, breaks: false }); }
  const mdToHtml = (s) => window.marked ? marked.parse(s || "") : ("<pre>" + (s || "") + "</pre>");

  const sum = DATA.summary;
  document.getElementById("summary").innerHTML =
    `<span class="pill pass">${sum.passed} passed</span> ` +
    (sum.failed ? `<span class="pill fail">${sum.failed} failed</span> ` : "") +
    (sum.skipped ? `<span class="pill skip">${sum.skipped} skipped</span>` : "");

  const picker = document.getElementById("picker");
  DATA.tutorials.forEach((t, i) => {
    const o = document.createElement("option");
    o.value = i; o.textContent = t.meta.name; picker.appendChild(o);
  });

  function execHtml(e) {
    const badge = `<span class="badge ${e.status}">${e.status.toUpperCase()}</span>`;
    const kind = `<span class="kind">${e.kind}${e.exit_code !== undefined ? " · exit " + e.exit_code : ""}</span>`;
    let h = `<div class="exec"><div class="exec-head">${badge}${kind}</div>`;
    if (e.note) h += `<div class="note">${escapeHtml(e.note)}</div>`;
    if (e.cmd) h += `<pre class="cmd">${escapeHtml(e.cmd)}</pre>`;
    const out = (e.output || "").trim();
    if (out) {
      const long = out.split("\n").length > 12;
      if (long) {
        h += `<details><summary>output (${out.split("\n").length} lines)</summary><pre class="output">${escapeHtml(out)}</pre></details>`;
      } else {
        h += `<pre class="output">${escapeHtml(out)}</pre>`;
      }
    }
    h += `</div>`;
    return h;
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
  }

  function render(idx) {
    const t = DATA.tutorials[idx];
    const main = document.getElementById("main");
    main.innerHTML = "";
    const h = document.createElement("div");
    h.className = "tutorial-title";
    h.textContent = t.meta.name + "  —  " + t.meta.platform;
    main.appendChild(h);

    t.rows.forEach(row => {
      const isStructural = row.execs.length === 0 &&
        (/^#\s|^##\s/.test(row.md.trim()));
      const div = document.createElement("div");
      const hasExec = row.execs.length > 0;
      const hasFail = row.execs.some(e => e.status === "fail");
      div.className = "row" + (hasExec ? "" : (isStructural ? " section" : " preamble")) +
        (hasFail ? " has-fail" : "");

      const left = document.createElement("div");
      left.className = "col left";
      left.innerHTML = `<div class="md">${mdToHtml(row.md)}</div>`;
      div.appendChild(left);

      if (hasExec || !isStructural) {
        const right = document.createElement("div");
        right.className = "col right";
        if (hasExec) {
          right.innerHTML = `<div class="col-label">Executed</div>` +
            row.execs.map(execHtml).join("");
        } else {
          right.innerHTML = `<div class="col-label">Executed</div>` +
            `<div class="empty">No commands run for this step.</div>`;
        }
        div.appendChild(right);
      }
      main.appendChild(div);
    });
  }

  function slug(s) {
    return String(s).toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "");
  }
  function indexFromHash() {
    const raw = decodeURIComponent(location.hash.replace(/^#/, ""));
    if (!raw) return 0;
    if (/^\d+$/.test(raw) && +raw < DATA.tutorials.length) return +raw;
    const i = DATA.tutorials.findIndex(
      t => slug(t.meta.name) === raw || t.meta.name === raw
    );
    return i >= 0 ? i : 0;
  }
  function show(idx) { picker.value = idx; render(idx); }
  picker.addEventListener("change", () => {
    location.hash = slug(DATA.tutorials[+picker.value].meta.name);
    render(+picker.value);
  });
  window.addEventListener("hashchange", () => show(indexFromHash()));
  show(indexFromHash());
</script>
